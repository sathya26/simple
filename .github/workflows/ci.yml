name: CI - Validate HTML

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install HTML Validator
        run: |
          npm install -g htmlhint

      - name: Validate HTML
        run: |
          htmlhint "**/*.html"